<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Generator</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial;
      background: black;
    }

    textarea, button {
      position: absolute;
      left: 20px;
      z-index: 10;
    }

    textarea {
      top: 20px;
      width: 250px;
      height: 80px;
      font-size: 16px;
    }

    button {
      top: 110px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #222;
    }

    #caption {
      position: absolute;
      bottom: 50px;
      left: 20px;
      color: white;
      font-size: 26px;
      font-weight: bold;
      z-index: 10;
    }

    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      display: none;
      z-index: 20;
    }
  </style>
</head>

<body>

  <textarea id="prompt" placeholder="gym, cars, travel..."></textarea>
  <button onclick="generateVideo()">Generate</button>

  <div id="loader">Loading...</div>

  <!-- ✅ CONTROLS ADDED -->
  <video id="videoPlayer" autoplay muted playsinline controls></video>

  <div id="caption"></div>

  <script>
    let videos = [];
    let currentIndex = 0;

    const videoPlayer = document.getElementById("videoPlayer");
    const loader = document.getElementById("loader");
    const captionEl = document.getElementById("caption");

    function playNextVideo() {
      if (!videos.length) return;

      const url = videos[currentIndex];
      console.log("PLAYING:", url);

      videoPlayer.src = url;
      videoPlayer.load();
      videoPlayer.play().catch(err => console.log("Play error:", err));

      captionEl.innerText = "Clip " + (currentIndex + 1);

      currentIndex = (currentIndex + 1) % videos.length;
    }

    // autoplay chain
    videoPlayer.addEventListener("ended", playNextVideo);

    async function generateVideo() {
      const prompt = document.getElementById("prompt").value;

      if (!prompt) {
        alert("Enter something first!");
        return;
      }

      loader.style.display = "block";

      try {
        const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ prompt }),
        });

        const data = await res.json();

        console.log("VIDEOS FROM API:", data.videos);

        videos = data.videos || [];

        // 🚨 FALLBACK if backend fails
        if (!videos.length) {
          console.warn("No videos from backend — using test video");
          videos = [
            "https://www.w3schools.com/html/mov_bbb.mp4"
          ];
        }

        currentIndex = 0;
        loader.style.display = "none";

        playNextVideo();

      } catch (err) {
        console.error("FETCH ERROR:", err);

        // 🚨 FULL fallback
        videos = [
          "https://www.w3schools.com/html/mov_bbb.mp4"
        ];

        loader.style.display = "none";
        playNextVideo();
      }
    }
  </script>

</body>
</html>
