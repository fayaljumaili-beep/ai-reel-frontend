<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Generator</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }

    textarea {
      width: 300px;
      height: 100px;
      font-size: 16px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }

    video {
      margin-top: 20px;
      width: 500px;
    }
  </style>
</head>
<body>

  <h1>🎬 AI Reel Generator</h1>

  <textarea id="prompt" placeholder="Type something like gym..."></textarea><br>

  <button id="generateBtn">Generate Video</button>

  <br>

  <video controls autoplay muted loop width="500"></video>

 <script>
  const button = document.querySelector("button");
const video = document.querySelector("video");

button.onclick = async () => {
  const prompt = document.querySelector("textarea").value;

  button.innerText = "Generating...";
  button.disabled = true;

  try {
    const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ prompt }),
    });

    const data = await res.json();

    video.src = data.videoUrl;
    video.load();
    video.play();

  } catch (err) {
    console.error(err);
    alert("Something broke");
  }

  button.innerText = "Generate Video";
  button.disabled = false;
};
  
</script>

</body>
</html>
