<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Generator</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    #controls {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
    }

    textarea {
      width: 250px;
      height: 60px;
      font-size: 16px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      cursor: pointer;
    }

    #caption {
      position: absolute;
      bottom: 80px;
      left: 20px;
      right: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    #downloadBtn {
      position: absolute;
      bottom: 20px;
      right: 20px;
    }

    #exportBtn {
      position: absolute;
      bottom: 20px;
      right: 140px;
    }
  </style>
</head>
<body>

<div id="controls">
  <textarea id="promptInput" placeholder="cars, gym, travel..."></textarea><br>
  <button onclick="generateVideo()">Generate</button>
  <button onclick="toggleVoice()">🔊 Voice</button>
</div>

<video id="videoPlayer" autoplay muted playsinline></video>

<div id="caption"></div>

<button id="downloadBtn" onclick="downloadVideo()">⬇ Download</button>
<button id="exportBtn" onclick="exportReel()">🎬 Export</button>

<script>
let videos = [];
let captions = [];
let currentIndex = 0;

let voiceEnabled = true;

const videoPlayer = document.getElementById("videoPlayer");
const captionEl = document.getElementById("caption");

function playNextVideo() {
  if (!videos.length) return;

  videoPlayer.src = videos[currentIndex];

  const text = captions[currentIndex] || "";
  captionEl.innerText = text;

  speak(text);

  videoPlayer.play();

  currentIndex = (currentIndex + 1) % videos.length;
}

videoPlayer.addEventListener("ended", playNextVideo);
videoPlayer.addEventListener("click", playNextVideo);

async function generateVideo() {
  const prompt = document.getElementById("promptInput").value;

  if (!prompt) {
    alert("Enter prompt");
    return;
  }

  const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  videos = data.videos || [];
  captions = data.captions || [];
  currentIndex = 0;

  playNextVideo();
}

function speak(text) {
  if (!voiceEnabled || !text) return;

  speechSynthesis.cancel();

  const u = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(u);
}

function toggleVoice() {
  voiceEnabled = !voiceEnabled;
}

function downloadVideo() {
  if (!videos.length) return;

  const index = currentIndex === 0 ? 0 : currentIndex - 1;

  const a = document.createElement("a");
  a.href = videos[index];
  a.download = "clip.mp4";
  a.click();
}

async function exportReel() {
  if (!videos.length) return;

  const res = await fetch("https://ai-reel-studio-production.up.railway.app/export-reel", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ videos })
  });

  const data = await res.json();

  const a = document.createElement("a");
  a.href = data.downloadUrl;
  a.download = "reel.mp4";
  a.click();
}
</script>

</body>
</html>
