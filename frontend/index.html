<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Generator</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 50px;">

  <h1>🎬 AI Reel Generator</h1>

  <textarea id="prompt" rows="4" cols="40">gym</textarea>
  <br><br>

  <button id="btn">Generate Video</button>

  <br><br>

  <video id="video" width="400" controls></video>

  <script>
    const button = document.getElementById("btn");
    const video = document.getElementById("video");

    button.addEventListener("click", async () => {
      const prompt = document.getElementById("prompt").value;

      console.log("Sending:", prompt);

      const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();

      console.log("Response:", data);

      video.src = data.videoUrl;
      video.play().catch(() => {});
    });
  </script>

</body>
</html>
