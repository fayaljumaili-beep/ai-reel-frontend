<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Reel Studio v1000</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      background: #111;
      box-shadow: 0 0 30px rgba(255,0,150,0.3);
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, pink, purple);
      color: white;
      cursor: pointer;
    }

    video {
      margin-top: 20px;
      width: 300px;
    }

    pre {
      margin-top: 10px;
      color: red;
      font-size: 12px;
      text-align: left;
      max-width: 300px;
      overflow: auto;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>AI Reel Studio v1000</h1>

  <button id="generateBtn">Generate</button>

  <p id="status"></p>
  <video id="video" controls></video>
  <pre id="errorBox"></pre>
</div>

<script>
  const API_URL = "https://ai-reel-studio-production.up.railway.app";

  const button = document.getElementById("generateBtn");
  const status = document.getElementById("status");
  const video = document.getElementById("video");
  const errorBox = document.getElementById("errorBox");

  button.onclick = async () => {
    try {
      status.innerText = "⏳ Generating...";
      errorBox.innerText = "";
      video.src = "";
      button.disabled = true;

      const url = `${API_URL}/generate?t=${Date.now()}`;
      console.log("CALLING:", url);

      const res = await fetch(url);

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || "Request failed");
      }

      const blob = await res.blob();
      const videoURL = URL.createObjectURL(blob);

      video.src = videoURL;
      status.innerText = "✅ Done!";
    } catch (err) {
      console.error(err);
      errorBox.innerText = err.message;
      status.innerText = "❌ Failed";
    } finally {
      button.disabled = false;
    }
  };
</script>

</body>
</html>
