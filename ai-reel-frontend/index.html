<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Reel Studio</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      background: #111;
      box-shadow: 0 0 30px rgba(255,0,150,0.3);
    }

    input {
      padding: 10px;
      width: 250px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, pink, purple);
      color: white;
      cursor: pointer;
    }

    video {
      margin-top: 20px;
      width: 300px;
    }

    pre {
      margin-top: 10px;
      color: red;
      font-size: 12px;
      text-align: left;
      max-width: 300px;
      overflow: auto;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>AI Reel Studio</h1>

  <input id="prompt" placeholder="Enter your idea..." />
  <br>
  <button id="generateBtn">Generate</button>

  <p id="status"></p>
  <video id="video" controls></video>
  <pre id="errorBox"></pre>
</div>

<script>
  const button = document.getElementById("generateBtn");
  const status = document.getElementById("status");
  const video = document.getElementById("video");
  const errorBox = document.getElementById("errorBox");

  button.onclick = async () => {
    try {
      const prompt = document.getElementById("prompt").value;

      if (!prompt) {
        alert("Enter a prompt");
        return;
      }

      status.innerText = "⏳ Generating...";
      errorBox.innerText = "";
      video.src = "";
      button.disabled = true;

      const res = await fetch(
        "https://ai-reel-studio-production.up.railway.app/generate",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text: prompt
          })
        }
      );

      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || "Request failed");
      }

      const blob = await res.blob();
      video.src = URL.createObjectURL(blob);

      status.innerText = "✅ Done!";
    } catch (err) {
      console.error(err);
      errorBox.innerText = err.message;
      status.innerText = "❌ Failed";
    } finally {
      button.disabled = false;
    }
  };
</script>

</body>
</html>
