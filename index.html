<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Studio</title>
  <style>
    body {
      background: black;
      font-family: Arial;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .card {
      max-width: 400px;
      margin: auto;
      padding: 20px;
      border-radius: 20px;
      background: #111;
      box-shadow: 0 0 40px purple;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, hotpink, purple);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    video {
      width: 100%;
      margin-top: 20px;
      border-radius: 12px;
    }

    .caption {
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: cyan;
      text-shadow: 0 0 10px black;
    }

    .video-wrapper {
      position: relative;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>AI Reel Studio</h1>

    <input id="prompt" placeholder="Enter topic..." />

    <select id="style">
      <option value="luxury">Luxury</option>
      <option value="business">Business</option>
      <option value="motivational">Motivational</option>
    </select>

    <select id="aesthetic">
      <option value="cinematic">Cinematic</option>
      <option value="tiktok">TikTok Fast Cuts</option>
      <option value="minimal">Minimal</option>
    </select>

    <select id="duration">
      <option value="30">30 sec</option>
      <option value="60">60 sec</option>
      <option value="90">90 sec</option>
    </select>

    <select id="voice">
      <option value="on">Voice ON</option>
      <option value="off">No Voice</option>
    </select>

    <button onclick="generate()">Generate</button>

    <div class="video-wrapper">
      <video id="video" controls></video>
      <div id="caption" class="caption"></div>
    </div>
  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const style = document.getElementById("style").value;
      const aesthetic = document.getElementById("aesthetic").value;
      const duration = document.getElementById("duration").value;
      const voice = document.getElementById("voice").value;

      const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, style, aesthetic, duration, voice })
      });

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);

      const video = document.getElementById("video");
      video.src = url;
      video.play();

      // simple caption demo
      const caption = document.getElementById("caption");
      caption.innerText = prompt;

      setInterval(() => {
        caption.style.opacity = Math.random() > 0.5 ? 1 : 0.5;
      }, 500);
    }
  </script>

</body>
</html>
