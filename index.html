<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Reel Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 🔥 FORCE NO CACHE -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 0 30px rgba(255, 0, 150, 0.4);
    }

    h1 {
      text-align: center;
    }

    input, button {
      width: 100%;
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: linear-gradient(90deg, #ff00cc, #3333ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    video {
      width: 100%;
      margin-top: 20px;
      border-radius: 10px;
      background: black;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>AI Reel Studio</h1>

  <input id="prompt" placeholder="Enter your idea..." />

  <button id="generateBtn">Generate</button>

  <div class="status" id="status"></div>

  <video id="video" controls></video>
</div>

<script>
console.log("🔥 FRONTEND VERSION 4 LOADED");

const API_URL = "https://ai-reel-studio-production.up.railway.app/generate-video";

document.getElementById("generateBtn").addEventListener("click", generate);

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const status = document.getElementById("status");
  const video = document.getElementById("video");

  if (!prompt) {
    alert("Enter a prompt");
    return;
  }

  status.innerText = "⏳ Generating video...";
  video.src = "";

  try {
    console.log("🚀 Sending request with text:", prompt);

    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        text: prompt   // ✅ CORRECT FIELD (THIS FIXES 400)
      })
    });

    console.log("📡 Response status:", res.status);

    if (!res.ok) {
      let err;
      try {
        err = await res.json();
      } catch {
        err = { error: "Unknown error" };
      }

      console.error("❌ Server error:", err);
      status.innerText = "❌ Failed";
      alert(err.error || "Something went wrong");
      return;
    }

    status.innerText = "🎬 Loading video...";

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    video.src = url;
    video.load();
    video.play();

    status.innerText = "✅ Done";

  } catch (err) {
    console.error("❌ Request failed:", err);
    status.innerText = "❌ Request failed";
  }
}
</script>

</body>
</html>
