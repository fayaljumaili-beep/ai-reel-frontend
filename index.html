<!DOCTYPE html>
<html>
<head>
  <title>AI Reel Studio</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: radial-gradient(circle at top, #0f0f1f, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 400px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(255,0,200,0.3);
    }

    h1 {
      background: linear-gradient(90deg, #ff00cc, #3333ff);
      -webkit-background-clip: text;
      color: transparent;
    }

    textarea, select {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #ff00cc, #3333ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    video {
      width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>AI Reel Studio</h1>

  <textarea id="prompt" placeholder="how to become rich in your 20s"></textarea>

  <select id="style">
    <option>Luxury</option>
    <option>Fitness</option>
    <option>Motivation</option>
    <option>Money</option>
    <option>Cinematic</option>
  </select>

  <select id="duration">
    <option value="30">30 sec</option>
    <option value="60" selected>60 sec</option>
  </select>

  <button onclick="generate()">Generate</button>
  <button onclick="exportVideo()">Export</button>

  <video id="video" controls></video>
</div>

<script>
let currentBlob;

async function generate() {
  const prompt = document.getElementById("prompt").value;
  const duration = document.getElementById("duration").value;

  const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt, duration })
  });

  const blob = await res.blob();
  currentBlob = blob;

  document.getElementById("video").src = URL.createObjectURL(blob);
}

function exportVideo() {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(currentBlob);
  a.download = "viral-reel.mp4";
  a.click();
}
</script>

</body>
</html>
