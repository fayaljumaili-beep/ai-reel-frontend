<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Reel Studio</title>

  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      width: 360px;
      box-shadow: 0 0 40px rgba(255, 0, 255, 0.3);
    }

    h1 {
      color: #ff00cc;
      text-align: center;
    }

    input, select {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #ff00cc, #3333ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .video-container {
      position: relative;
      margin-top: 20px;
    }

    video {
      width: 100%;
      border-radius: 15px;
    }

    /* 🔥 CAPTIONS */
    #captions {
      position: absolute;
      bottom: 80px;
      width: 100%;
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
      pointer-events: none;
      padding: 0 10px;
    }

    .caption-word {
      opacity: 0.3;
      margin: 0 4px;
      transition: all 0.15s ease;
    }

    .caption-word.active {
      opacity: 1;
      transform: scale(1.2);
      color: #00ffff;
    }
  </style>
</head>

<body>

<div class="app">
  <h1>AI Reel Studio</h1>

  <input id="prompt" placeholder="Enter video idea..." />

  <select id="length">
    <option value="30">30 sec</option>
    <option value="60">60 sec</option>
    <option value="90">90 sec</option>
  </select>

  <button onclick="generate()">Generate</button>

  <div class="video-container">
    <video id="video" controls></video>
    <div id="captions"></div>
  </div>
</div>

<script>
const video = document.getElementById("video");
const captionsDiv = document.getElementById("captions");

let captions = [];

// 🎯 render captions
function renderCaptions() {
  captionsDiv.innerHTML = captions
    .map((c, i) => `<span class="caption-word" id="w${i}">${c.word}</span>`)
    .join(" ");
}

// 🎯 sync captions with video
function updateCaptions() {
  const t = video.currentTime;

  captions.forEach((c, i) => {
    const el = document.getElementById(`w${i}`);
    if (!el) return;

    if (t >= c.time && t < (captions[i + 1]?.time || 999)) {
      el.classList.add("active");
    } else {
      el.classList.remove("active");
    }
  });
}

video.addEventListener("timeupdate", updateCaptions);

// 🚀 GENERATE VIDEO
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const length = document.getElementById("length").value;

  try {
    const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        prompt,
        length
      })
    });

    const data = await res.json();

    // 🎬 video
    video.src = "https://ai-reel-studio-production.up.railway.app/video-file?t=" + Date.now();
    video.load();
    video.play();

    // 📝 captions
    captions = data.captions || [];
    renderCaptions();

  } catch (err) {
    console.error(err);
    alert("Error generating video");
  }
}
</script>

</body>
</html>
