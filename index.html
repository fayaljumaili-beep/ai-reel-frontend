<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Reel Studio</title>
  <style>
    body {
      background: radial-gradient(circle at top, #0f0f1a, #000);
      font-family: Arial, sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 0 40px rgba(255,0,255,0.3);
    }

    h1 {
      color: #ff00ff;
      text-align: center;
    }

    textarea, select {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #ff00ff, #7a00ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    video {
      width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>AI Reel Studio</h1>

  <textarea id="prompt" placeholder="Enter your idea..."></textarea>

  <select id="category">
    <option>Luxury</option>
    <option>Motivation</option>
    <option>Fitness</option>
    <option>Business</option>
    <option>Psychology</option>
  </select>

  <select id="style">
    <option>TikTok Fast Cuts</option>
    <option>Cinematic</option>
    <option>Luxury Aesthetic</option>
    <option>Dark Motivation</option>
  </select>

  <select id="length">
    <option value="30">30 sec</option>
    <option value="60">60 sec</option>
    <option value="90">90 sec</option>
  </select>

  <select id="voice">
    <option>deep</option>
    <option>motivational</option>
    <option>calm</option>
    <option>aggressive</option>
  </select>

  <button onclick="generate()">Generate</button>

  <video id="video" controls></video>
</div>

<script>
async function generate() {
  const prompt = document.getElementById("prompt").value;
  const category = document.getElementById("category").value;
  const style = document.getElementById("style").value;
  const length = document.getElementById("length").value;
  const voice = document.getElementById("voice").value;

  const res = await fetch("https://ai-reel-studio-production.up.railway.app/generate-video", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt, category, style, length, voice })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  document.getElementById("video").src = url;
}
</script>

</body>
</html>
